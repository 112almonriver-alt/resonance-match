<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Match Resonance</title>
<style>
  :root {
    --bg: #120f1a;
    --surface: #1c1728;
    --surface-raised: #251f36;
    --text: #f3ede2;
    --text-dim: #9b93ac;
    --amber: #ffb454;
    --teal: #6fd8c7;
    --line: #332c47;
    --red: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', Inter, sans-serif;
    min-height: 100vh;
  }
  .display { font-family: 'Arial Black', system-ui, sans-serif; }
  .page {
    max-width: 640px; margin: 0 auto; padding: 32px 16px 80px;
  }
  .hero { text-align: center; margin: 32px 0 40px; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface); color: var(--amber);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 5px 12px; font-size: 12px; margin-bottom: 20px;
  }
  h1 { font-size: 34px; line-height: 1.05; margin: 0 0 12px; }
  h1 span { color: var(--teal); }
  .hero p { color: var(--text-dim); font-size: 14px; margin: 0; }

  /* Навигация */
  .nav {
    position: sticky; top: 0; z-index: 10;
    display: flex; gap: 4px; background: var(--bg);
    padding: 16px 16px 12px; max-width: 640px; margin: 0 auto;
    border-bottom: 1px solid var(--line);
  }
  .nav-btn {
    flex: 1; background: none; border: none; color: var(--text-dim);
    padding: 10px 4px; font-size: 13px; cursor: pointer; border-radius: 10px;
  }
  .nav-btn.active { background: var(--surface); color: var(--teal); }

  /* Формы */
  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 16px; padding: 24px;
  }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .field input {
    width: 100%; background: var(--surface-raised); border: 1px solid var(--line);
    border-radius: 10px; padding: 11px 14px; color: var(--text); font-size: 14px; outline: none;
  }
  .field input:focus { border-color: var(--teal); }
  .btn-primary {
    width: 100%; background: var(--amber); color: #1a1410; border: none;
    border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .btn-primary:disabled { opacity: 0.6; }
  .btn-ghost {
    background: none; border: 1px solid var(--line); color: var(--text-dim);
    border-radius: 12px; padding: 9px 16px; font-size: 13px; cursor: pointer;
  }
  .switch-mode { text-align: center; margin-top: 14px; font-size: 13px; color: var(--text-dim); }
  .switch-mode button { background: none; border: none; color: var(--teal); cursor: pointer; font-size: 13px; padding: 0; }

  .error {
    background: rgba(255,107,107,0.1); border: 1px solid var(--red);
    color: #ff8f8f; border-radius: 12px; padding: 12px 16px;
    font-size: 13px; margin-bottom: 20px;
  }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--teal); color: #0e2620; padding: 12px 20px; border-radius: 999px;
    font-size: 13px; font-weight: 600; z-index: 50;
  }

  /* Плейлист */
  form.url-form {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 16px; padding: 8px 8px 8px 16px; margin-bottom: 8px;
  }
  form.url-form input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-size: 14px; padding: 10px 0;
  }
  .hint { color: var(--text-dim); font-size: 12px; margin: 8px 4px 24px; }
  .section-label {
    display: flex; align-items: center; justify-content: space-between;
    color: var(--text-dim); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.08em; margin: 24px 4px 12px;
  }
  .toggle-all {
    color: var(--teal); border: 1px solid var(--line); background: none;
    border-radius: 999px; padding: 4px 12px; font-size: 12px; cursor: pointer;
  }
  .track-list {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 16px; padding: 8px; max-height: 300px; overflow-y: auto;
  }
  .track-row {
    display: flex; align-items: center; gap: 12px; width: 100%;
    padding: 10px 12px; border-radius: 12px; cursor: pointer;
    background: none; border: none; text-align: left; color: inherit; font-size: 14px;
  }
  .track-row.off { opacity: 0.4; }
  .checkbox {
    width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0;
    border: 1.5px solid var(--text-dim); display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--bg);
  }
  .checkbox.on { background: var(--teal); border-color: var(--teal); }
  .track-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .track-artist { color: var(--text-dim); }
  .genre-tag {
    color: var(--amber); background: rgba(255,180,84,0.1);
    border-radius: 999px; padding: 2px 8px; font-size: 10px; flex-shrink: 0;
  }

  /* Кандидаты */
  .candidate {
    display: flex; align-items: center; gap: 14px; width: 100%;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 16px; padding: 16px; margin-bottom: 12px; color: inherit;
  }
  .ring { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
  .ring svg { transform: rotate(-90deg); }
  .ring-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
  .candidate-info { flex: 1; min-width: 0; }
  .candidate-name { display: flex; align-items: baseline; gap: 8px; }
  .candidate-age { color: var(--text-dim); font-size: 12px; }
  .candidate-shared { color: var(--text-dim); font-size: 12px; margin-top: 4px; }
  .like-btn {
    background: var(--amber); color: #1a1410; border: none; border-radius: 999px;
    width: 40px; height: 40px; font-size: 16px; cursor: pointer; flex-shrink: 0;
  }
  .like-btn:disabled { opacity: 0.4; }
  .empty-state { text-align: center; color: var(--text-dim); font-size: 14px; padding: 40px 16px; }

  /* Мэтчи и чат */
  .match-row {
    display: flex; align-items: center; gap: 14px; width: 100%;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 16px; padding: 16px; margin-bottom: 10px; cursor: pointer; color: inherit; text-align: left;
  }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%; background: var(--surface-raised);
    display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--teal); flex-shrink: 0;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px; background: none; border: none;
    color: var(--text-dim); font-size: 12px; cursor: pointer; margin-bottom: 16px; padding: 0;
  }
  .chat-box {
    background: var(--surface); border: 1px solid var(--line); border-radius: 16px;
    padding: 16px; height: 380px; overflow-y: auto; margin-bottom: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .bubble { max-width: 75%; padding: 9px 13px; border-radius: 14px; font-size: 14px; line-height: 1.4; }
  .bubble.mine { align-self: flex-end; background: var(--teal); color: #0e2620; }
  .bubble.theirs { align-self: flex-start; background: var(--surface-raised); color: var(--text); }
  .chat-form { display: flex; gap: 8px; }
  .chat-form input {
    flex: 1; background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; color: var(--text); font-size: 14px; outline: none;
  }
  .spinner {
    width: 15px; height: 15px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #1a1410;
    border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div id="app"></div>

<script>
const API = "/api";
let state = {
  token: localStorage.getItem("match_resonance_token") || null,
  user: null,
  authMode: "login",     // 'login' | 'register'
  authForm: { email: "", password: "", name: "", age: "" },
  screen: "playlist",    // 'playlist' | 'candidates' | 'matches' | 'chat'
  error: null,
  loading: false,

  tracks: [],
  selectedIds: new Set(),
  profileSaved: false,

  candidates: [],
  candidatesLoaded: false,

  matches: [],
  activeMatch: null,
  messages: [],
  pollTimer: null,

  toast: null,
};

const $app = document.getElementById("app");

function setState(patch) {
  Object.assign(state, patch);
  render();
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str ?? "";
  return div.innerHTML;
}

function showToast(text) {
  setState({ toast: text });
  setTimeout(() => setState({ toast: null }), 2500);
}

async function api(path, opts = {}) {
  const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
  if (state.token) headers.Authorization = "Bearer " + state.token;

  const res = await fetch(API + path, { ...opts, headers });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || "Ошибка запроса");
  return data;
}

function logout() {
  localStorage.removeItem("match_resonance_token");
  clearInterval(state.pollTimer);
  state = { ...state, token: null, user: null, screen: "playlist", tracks: [], selectedIds: new Set(), candidates: [], matches: [], activeMatch: null, messages: [] };
  render();
}

// ---- Матчинг-логика (та же, что в backend/src/matching) ----
function buildWeights(genreList) {
  const counts = {};
  genreList.forEach((g) => { counts[g] = (counts[g] ?? 0) + 1; });
  const max = Math.max(1, ...Object.values(counts));
  const weights = {};
  Object.entries(counts).forEach(([g, c]) => { weights[g] = c / max; });
  return weights;
}
function getUserWeights() {
  const active = state.tracks.filter((t) => state.selectedIds.has(t.id));
  const allGenres = active.flatMap((t) => t.genres ?? []);
  return allGenres.length ? buildWeights(allGenres) : null;
}

// ================== AUTH ==================
async function handleAuthSubmit(e) {
  e.preventDefault();
  setState({ loading: true, error: null });
  const { email, password, name, age } = state.authForm;

  try {
    const path = state.authMode === "login" ? "/auth/login" : "/auth/register";
    const body = state.authMode === "login"
      ? { email, password }
      : { email, password, name, age: age ? Number(age) : undefined };

    const data = await api(path, { method: "POST", body: JSON.stringify(body) });
    localStorage.setItem("match_resonance_token", data.token);
    setState({ token: data.token, user: data.user, loading: false, screen: "playlist" });
  } catch (err) {
    setState({ error: err.message, loading: false });
  }
}

function renderAuth() {
  const f = state.authForm;
  return `
    <div class="page">
      <div class="hero">
        <div class="badge">✦ демо матчинга по звуку</div>
        <h1 class="display">Match <span>Resonance</span></h1>
        <p>${state.authMode === "login" ? "Войдите, чтобы увидеть свои совпадения" : "Создайте профиль за 30 секунд"}</p>
      </div>
      ${state.error ? `<div class="error">${escapeHtml(state.error)}</div>` : ""}
      <div class="card">
        <form id="auth-form">
          ${state.authMode === "register" ? `
            <div class="field"><label>Имя</label><input id="f-name" type="text" value="${escapeHtml(f.name)}" required /></div>
            <div class="field"><label>Возраст</label><input id="f-age" type="number" min="18" max="99" value="${escapeHtml(f.age)}" /></div>
          ` : ""}
          <div class="field"><label>Email</label><input id="f-email" type="email" value="${escapeHtml(f.email)}" required /></div>
          <div class="field"><label>Пароль</label><input id="f-password" type="password" value="${escapeHtml(f.password)}" required minlength="8" /></div>
          <button class="btn-primary" type="submit" ${state.loading ? "disabled" : ""}>
            ${state.loading ? '<span class="spinner"></span>' : (state.authMode === "login" ? "Войти" : "Зарегистрироваться")}
          </button>
        </form>
        <div class="switch-mode">
          ${state.authMode === "login" ? "Нет аккаунта?" : "Уже есть аккаунт?"}
          <button id="switch-mode-btn">${state.authMode === "login" ? "Зарегистрироваться" : "Войти"}</button>
        </div>
      </div>
    </div>
  `;
}

function bindAuthEvents() {
  document.getElementById("auth-form").addEventListener("submit", handleAuthSubmit);
  document.getElementById("switch-mode-btn").addEventListener("click", () => {
    setState({ authMode: state.authMode === "login" ? "register" : "login", error: null });
  });
  ["f-email", "f-password", "f-name", "f-age"].forEach((id) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("input", () => {
      const key = id.replace("f-", "");
      state.authForm[key] = el.value;
    });
  });
}

// ================== ПЛЕЙЛИСТ ==================
async function handlePlaylistSubmit(e) {
  e.preventDefault();
  const url = document.getElementById("playlist-url").value.trim();
  if (!url) return;

  setState({ loading: true, error: null });
  try {
    const data = await api("/profile", { method: "POST", body: JSON.stringify({ playlistUrl: url }) });
    setState({
      tracks: data.tracks,
      selectedIds: new Set(data.tracks.map((t) => t.id)),
      loading: false,
      profileSaved: false,
    });
  } catch (err) {
    setState({ error: err.message, loading: false });
  }
}

function toggleTrack(id) {
  if (state.selectedIds.has(id)) state.selectedIds.delete(id); else state.selectedIds.add(id);
  setState({ profileSaved: false });
}

function toggleAllTracks() {
  const allOn = state.selectedIds.size === state.tracks.length;
  state.selectedIds = allOn ? new Set() : new Set(state.tracks.map((t) => t.id));
  setState({ profileSaved: false });
}

async function saveProfile() {
  const weights = getUserWeights();
  if (!weights) return;

  setState({ loading: true });
  try {
    await api("/profile/save", {
      method: "POST",
      body: JSON.stringify({ genreWeights: weights, artistWeights: {} }),
    });
    setState({ loading: false, profileSaved: true, candidatesLoaded: false });
    showToast("Профиль сохранён");
  } catch (err) {
    setState({ error: err.message, loading: false });
  }
}

function renderPlaylistScreen() {
  const weights = getUserWeights();
  return `
    <div class="page">
      <div class="hero" style="margin-top:0">
        <h1 class="display" style="font-size:26px">Твой звуковой профиль</h1>
        <p>Вставь ссылку на публичный плейлист Spotify</p>
      </div>
      ${state.error ? `<div class="error">${escapeHtml(state.error)}</div>` : ""}
      <form class="url-form" id="playlist-form">
        <input id="playlist-url" type="text" placeholder="open.spotify.com/playlist/..." autocomplete="off" />
        <button class="btn-primary" style="width:auto;padding:11px 18px" type="submit" ${state.loading ? "disabled" : ""}>
          ${state.loading ? '<span class="spinner"></span>' : "Загрузить"}
        </button>
      </form>
      <p class="hint">Нужен запущенный бэкенд с ключами Spotify (см. README).</p>

      ${state.tracks.length > 0 ? `
        <div class="section-label">
          <span>Треков: ${state.tracks.length} · выбрано ${state.selectedIds.size}</span>
          <button class="toggle-all" id="toggle-all-btn">${state.selectedIds.size === state.tracks.length ? "Снять все" : "Выбрать все"}</button>
        </div>
        <div class="track-list">
          ${state.tracks.map((t) => `
            <button class="track-row ${state.selectedIds.has(t.id) ? "" : "off"}" data-id="${t.id}">
              <span class="checkbox ${state.selectedIds.has(t.id) ? "on" : ""}">${state.selectedIds.has(t.id) ? "✓" : ""}</span>
              <span class="track-title">${escapeHtml(t.title)} <span class="track-artist">— ${escapeHtml(t.artist)}</span></span>
              <span class="genre-tag">${escapeHtml((t.genres && t.genres[0]) || "—")}</span>
            </button>
          `).join("")}
        </div>
        <button class="btn-primary" id="save-profile-btn" style="margin-top:16px" ${!weights || state.loading ? "disabled" : ""}>
          ${state.profileSaved ? "✓ Профиль сохранён" : "Сохранить профиль и искать совпадения"}
        </button>
      ` : ""}
    </div>
  `;
}

function bindPlaylistEvents() {
  document.getElementById("playlist-form").addEventListener("submit", handlePlaylistSubmit);
  const toggleAllBtn = document.getElementById("toggle-all-btn");
  if (toggleAllBtn) toggleAllBtn.addEventListener("click", toggleAllTracks);
  document.querySelectorAll(".track-row").forEach((row) => {
    row.addEventListener("click", () => toggleTrack(Number(row.dataset.id)));
  });
  const saveBtn = document.getElementById("save-profile-btn");
  if (saveBtn) saveBtn.addEventListener("click", saveProfile);
}

// ================== КАНДИДАТЫ ==================
async function loadCandidates() {
  setState({ loading: true, error: null });
  try {
    const data = await api("/candidates");
    setState({ candidates: data.candidates, candidatesLoaded: true, loading: false });
  } catch (err) {
    setState({ error: err.message, loading: false, candidatesLoaded: true, candidates: [] });
  }
}

async function likeCandidate(id) {
  try {
    const data = await api("/likes", { method: "POST", body: JSON.stringify({ toUserId: id }) });
    setState({ candidates: state.candidates.filter((c) => c.id !== id) });
    showToast(data.matched ? "Это мэтч! 🎉" : "Лайк отправлен");
  } catch (err) {
    showToast(err.message);
  }
}

function ringSvg(score) {
  const c = 2 * Math.PI * 22;
  const offset = c * (1 - score / 100);
  return `
    <div class="ring">
      <svg width="52" height="52">
        <circle cx="26" cy="26" r="22" fill="none" stroke="var(--line)" stroke-width="5"></circle>
        <circle cx="26" cy="26" r="22" fill="none" stroke="var(--teal)" stroke-width="5"
          stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"></circle>
      </svg>
      <div class="ring-label">${score}%</div>
    </div>
  `;
}

function renderCandidatesScreen() {
  if (!state.candidatesLoaded && !state.loading) loadCandidates();

  if (state.loading) return `<div class="page"><div class="spinner"></div></div>`;
  if (state.error) return `<div class="page"><div class="error">${escapeHtml(state.error)}</div></div>`;
  if (state.candidates.length === 0) {
    return `<div class="page"><div class="empty-state">Пока нет подходящих кандидатов.<br/>Проверьте, что профиль сохранён на вкладке «Плейлист».</div></div>`;
  }

  return `
    <div class="page">
      ${state.candidates.map((c) => `
        <div class="candidate">
          ${ringSvg(c.score)}
          <div class="candidate-info">
            <div class="candidate-name"><span class="display">${escapeHtml(c.name)}</span><span class="candidate-age">${c.age ?? ""}</span></div>
            <div class="candidate-shared">${c.sharedGenres?.length ? "Общее: " + c.sharedGenres.map(escapeHtml).join(", ") : "Пересечений по жанрам нет"}</div>
          </div>
          <button class="like-btn" data-id="${c.id}">♥</button>
        </div>
      `).join("")}
    </div>
  `;
}

function bindCandidatesEvents() {
  document.querySelectorAll(".like-btn").forEach((btn) => {
    btn.addEventListener("click", () => likeCandidate(Number(btn.dataset.id)));
  });
}

// ================== МЭТЧИ И ЧАТ ==================
async function loadMatches() {
  setState({ loading: true, error: null });
  try {
    const data = await api("/matches");
    setState({ matches: data.matches, loading: false });
  } catch (err) {
    setState({ error: err.message, loading: false });
  }
}

async function openMatch(match) {
  clearInterval(state.pollTimer);
  setState({ activeMatch: match, messages: [], screen: "chat" });
  await loadMessages();
  state.pollTimer = setInterval(loadMessages, 3000);
}

async function loadMessages() {
  if (!state.activeMatch) return;
  try {
    const data = await api(`/matches/${state.activeMatch.id}/messages`);
    setState({ messages: data.messages });
    const box = document.getElementById("chat-box");
    if (box) box.scrollTop = box.scrollHeight;
  } catch (err) {
    // тихо игнорируем ошибки поллинга, чтобы не дёргать пользователя
  }
}

async function sendMessage(e) {
  e.preventDefault();
  const input = document.getElementById("chat-input");
  const content = input.value.trim();
  if (!content) return;
  input.value = "";

  try {
    await api(`/matches/${state.activeMatch.id}/messages`, {
      method: "POST",
      body: JSON.stringify({ content }),
    });
    await loadMessages();
  } catch (err) {
    showToast(err.message);
  }
}

function backToMatches() {
  clearInterval(state.pollTimer);
  setState({ screen: "matches", activeMatch: null, messages: [] });
}

function renderMatchesScreen() {
  if (state.matches.length === 0 && !state.loading) loadMatches();

  if (state.loading) return `<div class="page"><div class="spinner"></div></div>`;
  if (state.matches.length === 0) {
    return `<div class="page"><div class="empty-state">Пока нет мэтчей.<br/>Ставьте лайки на вкладке «Кандидаты».</div></div>`;
  }

  return `
    <div class="page">
      ${state.matches.map((m) => `
        <button class="match-row" data-id="${m.id}">
          <div class="avatar">${escapeHtml((m.other_name || "?")[0])}</div>
          <div>
            <div class="candidate-name"><span class="display">${escapeHtml(m.other_name)}</span><span class="candidate-age">${m.other_age ?? ""}</span></div>
          </div>
        </button>
      `).join("")}
    </div>
  `;
}

function bindMatchesEvents() {
  document.querySelectorAll(".match-row").forEach((row) => {
    row.addEventListener("click", () => {
      const match = state.matches.find((m) => m.id === Number(row.dataset.id));
      openMatch(match);
    });
  });
}

function renderChatScreen() {
  const m = state.activeMatch;
  return `
    <div class="page">
      <button class="back-btn" id="back-to-matches">← Ко всем мэтчам</button>
      <div class="hero" style="margin:0 0 16px;text-align:left">
        <h1 class="display" style="font-size:22px">${escapeHtml(m.other_name)}</h1>
      </div>
      <div class="chat-box" id="chat-box">
        ${state.messages.map((msg) => `
          <div class="bubble ${msg.sender_id === state.user.id ? "mine" : "theirs"}">${escapeHtml(msg.content)}</div>
        `).join("")}
      </div>
      <form class="chat-form" id="chat-form">
        <input id="chat-input" type="text" placeholder="Напишите сообщение..." autocomplete="off" />
        <button class="btn-primary" style="width:auto;padding:12px 20px" type="submit">Отправить</button>
      </form>
    </div>
  `;
}

function bindChatEvents() {
  document.getElementById("back-to-matches").addEventListener("click", backToMatches);
  document.getElementById("chat-form").addEventListener("submit", sendMessage);
  const box = document.getElementById("chat-box");
  if (box) box.scrollTop = box.scrollHeight;
}

// ================== NAV / ROOT ==================
function switchScreen(screen) {
  clearInterval(state.pollTimer);
  setState({ screen, error: null, activeMatch: null });
}

function renderNav() {
  const tabs = [
    { id: "playlist", label: "Плейлист" },
    { id: "candidates", label: "Кандидаты" },
    { id: "matches", label: "Мэтчи" },
  ];
  return `
    <div class="nav">
      ${tabs.map((t) => `<button class="nav-btn ${state.screen === t.id ? "active" : ""}" data-screen="${t.id}">${t.label}</button>`).join("")}
      <button class="nav-btn" id="logout-btn">Выйти</button>
    </div>
  `;
}

function bindNavEvents() {
  document.querySelectorAll(".nav-btn[data-screen]").forEach((btn) => {
    btn.addEventListener("click", () => switchScreen(btn.dataset.screen));
  });
  document.getElementById("logout-btn").addEventListener("click", logout);
}

async function ensureUserLoaded() {
  if (state.user || !state.token) return;
  try {
    const data = await api("/auth/me");
    state.user = data.user;
    render();
  } catch {
    logout();
  }
}

function render() {
  if (!state.token) {
    $app.innerHTML = renderAuth();
    bindAuthEvents();
    return;
  }

  if (!state.user) {
    $app.innerHTML = `<div class="page"><div class="spinner"></div></div>`;
    ensureUserLoaded();
    return;
  }

  let body = "";
  if (state.screen === "playlist") body = renderPlaylistScreen();
  else if (state.screen === "candidates") body = renderCandidatesScreen();
  else if (state.screen === "matches") body = renderMatchesScreen();
  else if (state.screen === "chat") body = renderChatScreen();

  $app.innerHTML = renderNav() + body + (state.toast ? `<div class="toast">${escapeHtml(state.toast)}</div>` : "");

  bindNavEvents();
  if (state.screen === "playlist") bindPlaylistEvents();
  else if (state.screen === "candidates") bindCandidatesEvents();
  else if (state.screen === "matches") bindMatchesEvents();
  else if (state.screen === "chat") bindChatEvents();
}

render();
</script>
</body>
</html>
