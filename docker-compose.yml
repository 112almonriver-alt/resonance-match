# Локальная база данных для разработки.
# Запуск: docker compose up -d
version: "3.9"
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: resonance
      POSTGRES_PASSWORD: resonance
      POSTGRES_DB: resonance
    ports:
      - "5432:5432"
    volumes:
      - resonance_db_data:/var/lib/postgresql/data

volumes:
  resonance_db_data:
